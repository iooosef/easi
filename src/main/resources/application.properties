spring.application.name=easi
spring.datasource.url=jdbc:postgresql://localhost:5432/${EASI_DB_NAME}
spring.datasource.username=${EASI_DB_USERNAME}
spring.datasource.password=${EASI_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true 


### email configuration
## how to w/ Gmail:
# 1. enable 2FA
# 2. generate an app password
#    - Go to myaccount.google.com → Security → 2-Step Verification → App passwords (at the bottom)
#    - Select app: Mail, device: Other (type "EASI" or anything)
#    - Google gives you a 16-character password — copy it
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

### office address (shown in delivery address quick-fill buttons)
app.office-address=${EASI_OFFICE_ADDRESS:}

### local file storage
app.storage.upload-dir=${EASI_UPLOAD_DIR:uploads/documents}

### database backup storage
app.backup.backup-dir=${EASI_BACKUP_DIR:backups}
# Full path to pg_dump / pg_restore executables (needed when PostgreSQL bin is not on the JVM PATH)
# Example on Windows: C:/Program Files/PostgreSQL/16/bin/pg_dump.exe
app.backup.pg-dump=${EASI_PG_DUMP:pg_dump}
app.backup.pg-restore=${EASI_PG_RESTORE:pg_restore}
app.backup.psql=${EASI_PSQL:psql}

### JWT configuration
jwt.secret=${JWT_SECRET}
# 15 minutes in milliseconds
jwt.access-token-expiration=900000
# 7 days in milliseconds
jwt.refresh-token-expiration=604800000

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.servlet.multipart.max-file-size=40MB
spring.servlet.multipart.max-request-size=40MB