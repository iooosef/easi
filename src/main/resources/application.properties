spring.application.name=easi
spring.datasource.url=jdbc:postgresql://localhost:5432/${EASI_DB_NAME}
spring.datasource.username=${EASI_DB_USERNAME}
spring.datasource.password=${EASI_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true 


### email configuration
## how to w/ Gmail:
# 1. enable 2FA
# 2. generate an app password
#    - Go to myaccount.google.com → Security → 2-Step Verification → App passwords (at the bottom)
#    - Select app: Mail, device: Other (type "EASI" or anything)
#    - Google gives you a 16-character password — copy it
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

### JWT configuration
jwt.secret=${JWT_SECRET}
# 15 minutes in milliseconds
jwt.access-token-expiration=900000
# 7 days in milliseconds
jwt.refresh-token-expiration=604800000

